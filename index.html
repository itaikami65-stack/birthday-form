<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Message Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#050816,#0c1733,#08101f);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:760px;
      background:rgba(12,18,35,.82);
      border:1px solid rgba(90,130,255,.2);
      backdrop-filter:blur(12px);
      border-radius:24px;
      padding:40px;
      box-shadow:0 0 35px rgba(0,80,255,.15);
    }

    .header{
      text-align:center;
      margin-bottom:35px;
    }

    .header img{
      width:160px;
      height:160px;
      object-fit:cover;
      border-radius:50%;
      border:3px solid rgba(120,170,255,.4);
      margin-bottom:18px;
    }

    .header h1{
      font-size:2rem;
      margin-bottom:10px;
    }

    .header p{
      color:#c6d4ff;
      line-height:1.7;
    }

    .form-group{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:10px;
      color:#e4ecff;
    }

    input,
    textarea{
      width:100%;
      padding:15px;
      border-radius:14px;
      border:1px solid rgba(120,150,255,.18);
      background:rgba(255,255,255,.06);
      color:white;
      outline:none;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .radio-group{
      display:flex;
      gap:20px;
    }

    .radio-option{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .address-section{
      display:none;
      margin-top:25px;
      padding-top:25px;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .submit-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
      font-size:1rem;
      cursor:pointer;
      margin-top:10px;
    }

    .footer-text{
      margin-top:18px;
      text-align:center;
      color:#9fb3e7;
      font-size:.82rem;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <img src="https://cdn.discordapp.com/attachments/1453230067084693514/1453247029890519152/133.png?ex=6a06a4c3&is=6a055343&hm=31d223051b4b56edffe14eb7ecb3e91f1b680488e6241750febaef34af66b678&" alt="Vtuber Image">

    <h1>Birthday Message for Maemi Nippy</h1>

    <p>
      ขอบคุณที่มาอวยพรวันเกิดนะคะ ✨<br>
      หากต้องการรับโปสการ์ด กรุณากรอกข้อมูลจัดส่งให้ครบถ้วนด้วยนะคะ
    </p>
  </div>

  <form id="birthdayForm">

    <div class="form-group">
      <label>ชื่อของคุณ</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label>ช่องทางติดต่อ</label>
      <input type="text" id="contact" required>
    </div>

    <div class="form-group">
      <label>ฝากข้อความอวยพรวันเกิด</label>
      <textarea id="message" required></textarea>
    </div>

    <div class="form-group">
      <label>ต้องการรับโปสการ์ดไหม</label>

      <div class="radio-group">

        <label class="radio-option">
          <input type="radio" name="postcard" value="yes">
          รับ
        </label>

        <label class="radio-option">
          <input type="radio" name="postcard" value="no" checked>
          ไม่รับ
        </label>

      </div>
    </div>

    <div class="address-section" id="addressSection">

      <div class="form-group">
        <label>ชื่อผู้รับ</label>
        <input type="text" id="receiverName">
      </div>

      <div class="form-group">
        <label>ที่อยู่</label>
        <textarea id="address"></textarea>
      </div>

      <div class="form-group">
        <label>ตำบล / แขวง</label>
        <input type="text" id="district">
      </div>

      <div class="form-group">
        <label>จังหวัด</label>
        <input type="text" id="province">
      </div>

      <div class="form-group">
        <label>รหัสไปรษณีย์</label>
        <input type="text" id="zipcode">
      </div>

    </div>

    <button type="submit" class="submit-btn">
      ส่งฟอร์ม
    </button>

    <div class="footer-text">
      ข้อมูลจะใช้สำหรับจัดส่งโปสการ์ดเท่านั้น
    </div>

  </form>

</div>

<script>

const radios = document.querySelectorAll('input[name="postcard"]');
const addressSection = document.getElementById('addressSection');

radios.forEach(radio => {
  radio.addEventListener('change', () => {

    if(radio.value === 'yes' && radio.checked){
      addressSection.style.display = 'block';
    }else{
      addressSection.style.display = 'none';
    }

  });
});

const form = document.getElementById('birthdayForm');

form.addEventListener('submit', async (e) => {

  e.preventDefault();

  const data = {
    name: document.getElementById('name').value,
    contact: document.getElementById('contact').value,
    message: document.getElementById('message').value,
    wantPostcard: document.querySelector('input[name=\"postcard\"]:checked').value,

    receiverName: document.getElementById('receiverName').value,
    address: document.getElementById('address').value,
    district: document.getElementById('district').value,
    province: document.getElementById('province').value,
    zipcode: document.getElementById('zipcode').value
  };

  await fetch('https://script.google.com/macros/s/AKfycbwG4SjKATiJahqMTF7cpXpRywYnpJ0wzs3VtRZbYLZSuVON4ep8DQdor54lwlR2e2ejzA/exec', {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(data)
  });

  alert('ส่งฟอร์มเรียบร้อยแล้ว ✨');

  form.reset();

  addressSection.style.display = 'none';

});

</script>

</body>
</html>
