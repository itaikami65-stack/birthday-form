<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Message Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #050816, #0c1733, #08101f);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: rgba(12, 18, 35, 0.82);
      border: 1px solid rgba(90, 130, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 0 35px rgba(0, 80, 255, 0.15);
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .header img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid rgba(120, 170, 255, 0.4);
      margin-bottom: 18px;
      box-shadow: 0 0 20px rgba(70, 120, 255, 0.25);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .header p {
      color: #c6d4ff;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      color: #e4ecff;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(120, 150, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: white;
      outline: none;
      transition: 0.25s ease;
      font-size: 0.95rem;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #5c8dff;
      box-shadow: 0 0 12px rgba(92, 141, 255, 0.35);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d7e2ff;
    }

    .address-section {
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: none;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s ease;
      margin-top: 10px;
      box-shadow: 0 0 18px rgba(37, 99, 235, 0.25);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 22px rgba(37, 99, 235, 0.45);
    }

    .footer-text {
      margin-top: 18px;
      text-align: center;
      color: #9fb3e7;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .container {
        padding: 28px 20px;
      }

      .header h1 {
        font-size: 1.6rem;
      }

      .header img {
        width: 130px;
        height: 130px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <img src="https://cdn.discordapp.com/attachments/1453230067084693514/1453247029890519152/133.png?ex=6a06a4c3&is=6a055343&hm=31d223051b4b56edffe14eb7ecb3e91f1b680488e6241750febaef34af66b678&" alt="Vtuber Image">

      <h1>Birthday Message for Maemi Nippy </h1>

      <p>
        ขอบคุณที่มาอวยพรวันเกิดนะคะ ✨<br>
        หากต้องการรับโปสการ์ด กรุณากรอกข้อมูลจัดส่งให้ครบถ้วนด้วยนะคะ
      </p>
    </div>

    <form>

      <div class="form-group">
        <label>ชื่อของคุณ</label>
        <input type="text" placeholder="กรอกชื่อของคุณ" required>
      </div>

      <div class="form-group">
        <label>ช่องทางติดต่อ</label>
        <input type="text" placeholder="Discord / X(Twitter) / Facebook / Email" required>
      </div>

      <div class="form-group">
        <label>ฝากข้อความอวยพรวันเกิด</label>
        <textarea placeholder="พิมพ์ข้อความอวยพรที่นี่..." required></textarea>
      </div>

      <div class="form-group">
        <label>ต้องการรับโปสการ์ดไหม</label>

        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="postcard" value="yes">
            รับ
          </label>

          <label class="radio-option">
            <input type="radio" name="postcard" value="no" checked>
            ไม่รับ
          </label>
        </div>
      </div>

      <div class="address-section" id="addressSection">

        <div class="form-group">
          <label>ชื่อผู้รับ</label>
          <input type="text" placeholder="ชื่อผู้รับ">
        </div>

        <div class="form-group">
          <label>บ้านเลขที่ / รายละเอียดที่อยู่</label>
          <textarea placeholder="กรอกที่อยู่โดยละเอียด"></textarea>
        </div>

        <div class="form-group">
          <label>ตำบล / แขวง</label>
          <input type="text" placeholder="ตำบล / แขวง">
        </div>

        <div class="form-group">
          <label>อำเภอ / เขต</label>
          <input type="text" placeholder="อำเภอ / เขต">
        </div>

        <div class="form-group">
          <label>จังหวัด</label>
          <input type="text" placeholder="จังหวัด">
        </div>

        <div class="form-group">
          <label>รหัสไปรษณีย์</label>
          <input type="text" placeholder="รหัสไปรษณีย์">
        </div>

      </div>

      <button type="submit" class="submit-btn">
        ส่งฟอร์ม
      </button>

      <div class="footer-text">
        ข้อมูลที่อยู่จะใช้สำหรับจัดส่งโปสการ์ดเท่านั้น และจะไม่เผยแพร่ต่อสาธารณะ
      </div>

    </form>

  </div>

  <script>
    const radios = document.querySelectorAll('input[name="postcard"]');
    const addressSection = document.getElementById('addressSection');

    radios.forEach(radio => {
      radio.addEventListener('change', () => {
        if (radio.value === 'yes' && radio.checked) {
          addressSection.style.display = 'block';
        } else if (radio.value === 'no' && radio.checked) {
          addressSection.style.display = 'none';
        }
      });
    });
  </script>

</body>
</html>
